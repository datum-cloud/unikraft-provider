name: build

on:
  push:
  release:
    types: ["published"]

jobs:
  validate-kustomize:
    uses: datum-cloud/actions/.github/workflows/validate-kustomize.yaml@v1.12.1

  publish-container-image:
    needs:
      - validate-kustomize
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
    uses: datum-cloud/actions/.github/workflows/publish-docker.yaml@v1.12.1
    with:
      image-name: unikraft-provider
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  publish-kustomize-bundle:
    needs:
      - validate-kustomize
      - publish-container-image
    permissions:
      id-token: write
      contents: read
      packages: write
    uses: datum-cloud/actions/.github/workflows/publish-kustomize-bundle.yaml@v1.12.1
    with:
      bundle-name: ghcr.io/datum-cloud/unikraft-provider-kustomize
      bundle-path: config
      image-overlays: config/default
      image-name: ghcr.io/datum-cloud/unikraft-provider
    secrets: inherit
