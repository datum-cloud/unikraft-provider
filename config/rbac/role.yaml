apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: infra-provider-unikraft
    app.kubernetes.io/managed-by: kustomize
  name: manager-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["unikraft.com"]
  resources: ["instances", "instances/status", "volumes", "volumes/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["compute.datumapis.com"]
  resources: ["instances", "instances/status"]
  verbs: ["get", "list", "watch", "update", "patch"]
