apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kraftlet
spec:
  interval: 1h
  chart:
    spec:
      chart: kraftlet
      version: 0.4.0
      sourceRef:
        kind: HelmRepository
        name: unikraft-cloud
  values:
    image:
      tag: "0.4.0"
    kraftlet:
      podSyncWorkers: 64
      podStatusUpdateInterval: "5s"
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  valuesFrom:
    # Real credentials injected via task test:create-ukc-credentials.
    # When the Secret exists, its values override the fallback ConfigMap.
    # When absent (no .env / no CI secrets), the fallback provides e2e-fake.
    - kind: ConfigMap
      name: ukc-credentials-fallback
      valuesKey: values.yaml
    - kind: Secret
      name: ukc-credentials
      valuesKey: values.yaml
      optional: true
