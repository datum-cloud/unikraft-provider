apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: functions.functions.datumapis.com
spec:
  group: functions.datumapis.com
  scope: Namespaced
  names:
    kind: Function
    plural: functions
    singular: function
    shortNames:
      - fn
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
        scale:
          specReplicasPath: .spec.scaling.minReplicas
          statusReplicasPath: .status.readyReplicas
      additionalPrinterColumns:
        - name: Active Revision
          type: string
          jsonPath: .status.activeRevision
        - name: Hostname
          type: string
          jsonPath: .status.hostname
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
