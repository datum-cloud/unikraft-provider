apiVersion: compute.datumapis.com/v1alpha
kind: Instance
metadata:
  name: e2e-sandbox-instance
spec:
  runtime:
    resources:
      instanceType: datumcloud/d1-standard-2
    sandbox:
      containers:
        - name: app
          image: datum/bun@sha256:13a3b306652d78df4230d57ca2404dc62788c6c9265e11d76d8f3bc05d1a4efc
          env:
            - name: ENVIRONMENT
              value: e2e
          ports:
            - name: http
              port: 3000
              protocol: TCP
          resources:
            limits:
              memory: 512Mi
  networkInterfaces:
    - network:
        name: default
