apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: create-instance
spec:
  steps:
    - name: create upstream Instance
      try:
        - apply:
            file: instance.yaml
        - assert:
            resource:
              apiVersion: compute.datumapis.com/v1alpha
              kind: Instance
              metadata:
                name: e2e-sandbox-instance
              status:
                (length(conditions) > `0`): true
    - name: assert downstream Pod materializes
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                labels:
                  managed-by: infra-provider-unikraft
                  upstream.instance: e2e-sandbox-instance
              spec:
                (nodeSelector.'kubernetes.io/hostname' != null): true
